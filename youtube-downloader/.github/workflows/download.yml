name: YouTube Downloader (Split 90MB)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true
      quality:
        description: 'کیفیت (best, 720, 480)'
        required: false
        default: 'best'

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: نصب yt-dlp (تنها وابستگی)
        run: pip install yt-dlp

      - name: دانلود ویدیو
        run: |
          yt-dlp -f "${{ github.event.inputs.quality }}" \
                 --output "video.%(ext)s" \
                 "${{ github.event.inputs.url }}"

      - name: تقسیم فایل به قطعات 90 مگابایتی
        run: |
          mkdir -p videos
          # فرض می‌کنیم فایل ویدیو پسوند mp4 یا webm دارد
          for file in video.*; do
            if [ -f "$file" ]; then
              split -b 90m "$file" "videos/part_"
            fi
          done

      - name: آپلود قطعات به گیت‌هاب
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/
          git commit -m "افزودن قطعات ویدیو (۹۰ مگابایتی)" || echo "هیچ تغییری"
          git push
