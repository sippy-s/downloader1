name: YouTube Downloader (Fast with Cache)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true
      quality:
        description: 'کیفیت (best, 720, 480, worst)'
        required: false
        default: 'best'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages (ffmpeg)
        uses: actions/cache@v4
        id: cache-apt
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-ffmpeg

      - name: Install ffmpeg (cached)
        if: steps.cache-apt.outputs.cache-hit != 'true'
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Cache pip packages (yt-dlp)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ytdlp

      - name: Install yt-dlp (cached)
        run: pip install yt-dlp

      - name: Download video
        run: |
          mkdir -p videos
          yt-dlp -f "${{ github.event.inputs.quality }}" \
                 --output "videos/%(title)s.%(ext)s" \
                 "${{ github.event.inputs.url }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/
          git commit -m "Add video: ${{ github.event.inputs.url }}" || echo "No change"
          git push
